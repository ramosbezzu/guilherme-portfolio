name: Deploy GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Stage static site
        run: |
          mkdir -p _site
          cp index.html _site/
          cp 404.html _site/
          cp styles.css _site/
          cp script.js _site/
          cp favicon.svg _site/
          cp robots.txt _site/
          cp .nojekyll _site/

          if [ -d media ]; then
            cp -R media _site/
          fi

          find . -maxdepth 1 -type f \( -name '*.pdf' -o -name 'CNAME' \) -exec cp {} _site/ \;

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
